<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>ثبت زمان — گروه بوشهر</title>
<meta name="theme-color" content="#3D2510"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ثبت زمان"/>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%233D2510'/%3E%3Ctext x='96' y='130' font-size='100' text-anchor='middle' fill='%23FAF0E0'%3E%E2%8F%B1%3C/text%3E%3C/svg%3E"/>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:#F5EFE6;font-family:'Vazirmatn',Tahoma,sans-serif;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);min-height:100vh}
button,input{font-family:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
input{font-size:16px!important}
.page{max-width:480px;margin:0 auto;padding:14px 14px 80px}
/* bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#3D2510;display:flex;border-top:2px solid #5A3A20;padding-bottom:env(safe-area-inset-bottom);z-index:500}
.bnav button{flex:1;background:none;border:none;color:#C4A882;font-size:10px;font-weight:700;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.bnav button.on{color:#FAF0E0}
.bnav button span{font-size:20px;line-height:1}
/* header */
.hdr{text-align:center;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid #D4B896}
.hdr-grp{font-size:12px;font-weight:700;color:#7C3AED;margin-bottom:3px}
.hdr-title{font-size:21px;font-weight:700;color:#2A1A08}
.hdr-sub{font-size:10px;color:#9A7A5A;margin-top:2px}
/* date row */
.drow{display:flex;align-items:center;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:10px}
.drow label{font-size:13px;font-weight:600;color:#5A3A1A}
.drow input[type=date]{border:1.5px solid #C4A882;border-radius:8px;padding:6px 10px;background:#FFF9F2;color:#2A1A08;direction:ltr;outline:none}
.as-badge{font-size:10px;color:#059669;font-weight:600}
/* legend */
.legend{display:flex;flex-wrap:wrap;gap:4px 10px;justify-content:center;margin-bottom:10px}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.legend-lbl{font-size:10px;font-weight:600}
/* grid */
.grid-wrap{border:1.5px solid #C4A882;border-radius:10px;overflow:hidden;margin-bottom:10px;box-shadow:0 2px 12px rgba(80,40,0,.08)}
.grid-head{display:grid;grid-template-columns:48px 1fr 1fr 1fr 1fr;background:#3D2510;color:#FAF0E0}
.grid-head div{padding:7px 4px;font-size:11px;text-align:center;font-weight:700;border-left:1px solid #5A3A20}
.grid-body{max-height:50vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.grid-row{display:grid;grid-template-columns:48px 1fr 1fr 1fr 1fr;border-bottom:1px solid #DDD0C0}
.grid-row:nth-child(odd){background:#FAF6F0}
.grid-row:nth-child(even){background:#F2EBE0}
.hlbl{padding:4px 2px;font-size:11px;text-align:center;color:#7A5A3A;font-weight:600;display:flex;align-items:center;justify-content:center;border-left:1px solid #DDD0C0;background:#EEE5D8}
.cell{padding:2px 4px;min-height:38px;cursor:pointer;display:flex;align-items:center;border-left:1px solid #DDD0C0}
.cell-txt{font-size:11px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;width:100%;color:#C8B89A}
/* progress */
.prog-lbl{font-size:11px;color:#7A5A3A;text-align:center;margin-bottom:4px}
.prog-bar{height:6px;background:#DDD0C0;border-radius:3px;overflow:hidden;margin-bottom:10px}
.prog-fill{height:100%;background:#3D2510;border-radius:3px;transition:width .3s}
/* buttons */
.btn-row{display:flex;gap:8px;margin-bottom:12px}
.btn{border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;min-height:50px;padding:13px}
.btn-save{flex:1;background:#3D2510;color:#FAF0E0}
.btn-share{flex:1;background:#7C3AED;color:#FFF}
.btn-reset{padding:13px 16px;background:#FFF5F5;color:#DC2626;border:1.5px solid #DC2626!important}
/* today summary */
.sum-box{background:#FFF9F2;border:1.5px solid #C4A882;border-radius:10px;padding:12px 14px;margin-bottom:12px}
.sum-title{font-size:13px;font-weight:700;margin-bottom:10px;color:#3D2510}
.sum-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.sum-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.sum-lbl{font-size:11px;flex:1;color:#3D2510}
.sum-time{font-size:12px;font-weight:700;min-width:44px;text-align:left}
.bar-track{width:50px;height:5px;background:#E8DFD0;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .3s}
.pct{font-size:10px;color:#9A7A5A;min-width:26px;text-align:left}
/* modal */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:1000}
.modal{background:#FFF9F2;border-radius:20px 20px 0 0;padding:8px 18px 30px;width:100%;max-width:480px;direction:rtl;animation:slideUp .25s ease}
.modal-handle{width:40px;height:4px;background:#C4A882;border-radius:2px;margin:8px auto 14px}
.modal-hdr{font-size:14px;font-weight:700;color:#3D2510;margin-bottom:12px;text-align:center}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.cat-btn{padding:9px 6px;border-radius:8px;border:1.5px solid;font-size:12px;font-weight:600;cursor:pointer;text-align:right;min-height:44px;background:transparent;transition:all .12s}
.modal-input{width:100%;border:1.5px solid #C4A882;border-radius:8px;padding:10px;font-size:16px!important;background:#FFF;color:#2A1A08;direction:rtl;outline:none;margin-bottom:12px}
.modal-btns{display:flex;gap:8px}
.mbtn-ok{flex:1;padding:12px;border-radius:8px;background:#3D2510;color:#FAF0E0;border:none;font-size:14px;font-weight:700;cursor:pointer;min-height:48px}
.mbtn-clear{padding:12px 14px;border-radius:8px;background:#FFF5F5;color:#DC2626;border:1.5px solid #DC2626;font-size:14px;font-weight:700;cursor:pointer;min-height:48px}
.mbtn-cancel{padding:12px 14px;border-radius:8px;background:#F0EBE3;color:#7A5A3A;border:1.5px solid #C4A882;font-size:14px;font-weight:700;cursor:pointer;min-height:48px}
/* confirm */
.conf-ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:2000;padding:20px}
.conf-box{background:#FFF9F2;border-radius:16px;padding:22px 20px;width:100%;max-width:320px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.3)}
.conf-title{font-size:15px;font-weight:700;color:#2A1A08;margin-bottom:18px;line-height:1.5}
.conf-btns{display:flex;gap:10px}
.conf-yes{flex:1;padding:11px;border-radius:10px;background:#DC2626;color:#FFF;border:none;font-size:14px;font-weight:700;cursor:pointer}
.conf-no{flex:1;padding:11px;border-radius:10px;background:#F0EBE3;color:#7A5A3A;border:1.5px solid #C4A882;font-size:14px;font-weight:700;cursor:pointer}
/* toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1A3A1A;color:#AEF0AE;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;white-space:nowrap;animation:slideDown .2s ease}
/* stats */
.period-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
.period-btn{padding:7px 12px;border-radius:20px;border:1.5px solid #C4A882;background:transparent;color:#7A5A3A;font-size:12px;font-weight:600;cursor:pointer}
.period-btn.on{background:#3D2510;color:#FAF0E0;border-color:#3D2510}
.cat-filter{background:#FFF9F2;border:1.5px solid #C4A882;border-radius:10px;padding:10px 12px;margin-bottom:12px}
.cat-filter-lbl{font-size:11px;font-weight:700;color:#7A5A3A;margin-bottom:8px}
.cat-filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.cf-btn{padding:7px 6px;border-radius:8px;border:1.5px solid;font-size:11px;font-weight:600;cursor:pointer;text-align:right;min-height:36px}
.chart-box{background:#FFF9F2;border:1.5px solid #C4A882;border-radius:10px;padding:12px 14px;margin-bottom:12px}
.chart-title{font-size:13px;font-weight:700;color:#3D2510;margin-bottom:10px}
.chart-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.no-data{text-align:center;padding:30px 0;font-size:13px;color:#9A7A5A;line-height:2}
.leg-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.offline-badge{position:fixed;top:10px;right:10px;background:#DC2626;color:#FFF;font-size:11px;font-weight:700;padding:4px 10px;border-radius:12px;z-index:9998}
/* ios hint */
.ios-hint{background:#FFF9F2;border-radius:16px;padding:20px;max-width:320px;width:100%;text-align:right;box-shadow:0 8px 40px rgba(0,0,0,.3)}
.ios-hint p{font-size:13px;color:#3D2510;line-height:2;margin-bottom:16px}
.footer{text-align:center;font-size:11px;font-weight:700;color:#7C3AED;padding-bottom:8px}
.footer small{display:block;margin-top:6px;font-size:10px;color:#5A3A1A;font-weight:400}
@keyframes slideDown{from{transform:translate(-50%,-20px);opacity:0}to{transform:translate(-50%,0);opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── constants ─────────────────────────────────────────────────────────────
const CATS = [
  {id:1,label:"خواب",color:"#1E40AF"},
  {id:2,label:"ابهام در زمان",color:"#6B7280"},
  {id:3,label:"تفریح و سرگرمی",color:"#DB2777"},
  {id:4,label:"کسب و کار",color:"#0369A1"},
  {id:5,label:"مراقبت از خودم",color:"#059669"},
  {id:6,label:"مراقبت از داراییها",color:"#B45309"},
  {id:7,label:"بهبودی و خودشناسی",color:"#7C3AED"},
  {id:8,label:"پیگیری چشم‌انداز",color:"#0F766E"},
  {id:9,label:"خدمت به خانواده",color:"#DC2626"},
];
const PN=["۰","۱","۲","۳","۴","۵","۶","۷","۸","۹"];
const fa=n=>String(n).replace(/\d/g,d=>PN[+d]);
const pad=n=>String(n).padStart(2,"0");
const today=()=>{const d=new Date();return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;};
const emptyGrid=()=>Array(24).fill(0).map(()=>Array(4).fill(0).map(()=>({catId:null,text:""})));
const QLAB=["۰۰","۱۵","۳۰","۴۵"];

// ── تقویم شمسی شاهنشاهی ──────────────────────────────────────────────────
// شمسی = میلادی → جلالی؛ شاهنشاهی = شمسی + ۱۱۸۰ (از ۵۵۹ ق.م.)
const SHAMSI_MONTHS=["فروردین","اردیبهشت","خرداد","تیر","مرداد","شهریور","مهر","آبان","آذر","دی","بهمن","اسفند"];
function gregToShamsi(gy,gm,gd){
  const g_y=gy-1600,g_m=gm-1,g_d=gd-1;
  let g_dn=365*g_y+Math.floor((g_y+3)/4)-Math.floor((g_y+99)/100)+Math.floor((g_y+399)/400);
  const gD=[31,28+(g_y%4==0&&(g_y%100!=0||g_y%400==0)?1:0),31,30,31,30,31,31,30,31,30,31];
  for(let i=0;i<g_m;i++)g_dn+=gD[i];
  g_dn+=g_d;
  let j_dn=g_dn-79;
  const j_np=Math.floor(j_dn/12053);
  j_dn%=12053;
  let jy=979+33*j_np+4*Math.floor(j_dn/1461);
  j_dn%=1461;
  if(j_dn>=366){jy+=Math.floor((j_dn-1)/365);j_dn=(j_dn-1)%365;}
  const jD=[31,31,31,31,31,31,30,30,30,30,30,29];
  let jm=0,jd=0;
  for(let i=0;i<12;i++){if(j_dn<jD[i]){jm=i+1;jd=j_dn+1;break;}j_dn-=jD[i];}
  return{y:jy,m:jm,d:jd};
}
function dateStrToShamsi(ds){
  if(!ds)return'';
  const[gy,gm,gd]=ds.split('-').map(Number);
  const s=gregToShamsi(gy,gm,gd);
  const imp=s.y+1180; // شمسی → شاهنشاهی
  return`${fa(imp)} ${SHAMSI_MONTHS[s.m-1]} ${fa(s.d)}`;
}
function dateStrToShamsiShort(ds){
  if(!ds)return'';
  const[gy,gm,gd]=ds.split('-').map(Number);
  const s=gregToShamsi(gy,gm,gd);
  return`${s.m}/${s.d}`; // برای نمودار همان شمسی کوتاه
}

// ── ناوبری تاریخ ─────────────────────────────────────────────────────────
function prevDay(ds){const d=new Date(ds);d.setDate(d.getDate()-1);return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function nextDay(ds){const d=new Date(ds);d.setDate(d.getDate()+1);return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}


// ── storage ───────────────────────────────────────────────────────────────
const st={
  get:k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));return true}catch{return false}}
};

// ── PWA ───────────────────────────────────────────────────────────────────
(()=>{
  const m={name:"ثبت زمان — گروه بوشهر",short_name:"ثبت زمان",start_url:"./",display:"standalone",
    background_color:"#F5EFE6",theme_color:"#3D2510",lang:"fa",dir:"rtl",
    icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%233D2510'/%3E%3Ctext x='96' y='130' font-size='100' text-anchor='middle' fill='%23FAF0E0'%3E%E2%8F%B1%3C/text%3E%3C/svg%3E",sizes:"192x192",type:"image/svg+xml",purpose:"any maskable"}]};
  const lnk=document.createElement("link");lnk.rel="manifest";
  lnk.href=URL.createObjectURL(new Blob([JSON.stringify(m)],{type:"application/json"}));
  document.head.appendChild(lnk);
  const sw=`const C='ts-v1';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.add(new Request(self.location.href.replace('blob:',''),{cache:'reload'}))).catch(()=>{}));self.skipWaiting();});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(caches.match(e.request).then(c=>{const f=fetch(e.request).then(r=>{if(r.ok)caches.open(C).then(x=>x.put(e.request,r.clone()));return r;}).catch(()=>c);return c||f;}));});`;
  if('serviceWorker'in navigator)navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'})),{scope:'./'}).catch(()=>{});
})();

// ── state ─────────────────────────────────────────────────────────────────
let state={
  tab:'sheet',
  dateStr:today(),
  grid:emptyGrid(),
  modal:null,          // {h,q}
  modalCat:null,
  modalText:'',
  confirm:false,
  toast:'',
  toastTimer:null,
  autoSaveTimer:null,
  autoSaved:false,
  offline:!navigator.onLine,
  installPrompt:null,
  showInstall:false,
  bannerDismissed:st.get('install-dismissed')||false,
  isIOS:/iphone|ipad|ipod/i.test(navigator.userAgent),
  isStandalone:window.navigator.standalone===true||window.matchMedia('(display-mode: standalone)').matches,
  // stats
  period:'week',
  selCats:CATS.map(c=>c.id),
};

function setState(patch){Object.assign(state,patch);render();}

// ── helpers ───────────────────────────────────────────────────────────────
function showToast(msg){
  if(state.toastTimer)clearTimeout(state.toastTimer);
  const t=setTimeout(()=>setState({toast:'',toastTimer:null}),2200);
  setState({toast:msg,toastTimer:t});
}

function loadDate(d){
  const g=st.get('ts:'+d);
  setState({dateStr:d,grid:g||emptyGrid()});
}

function saveGrid(){
  const ok=st.set('ts:'+state.dateStr,state.grid);
  showToast(ok?'✓ ذخیره شد':'خطا در ذخیره');
}

function autoSave(){
  if(state.autoSaveTimer)clearTimeout(state.autoSaveTimer);
  const t=setTimeout(()=>{
    st.set('ts:'+state.dateStr,state.grid);
    setState({autoSaved:true});
    setTimeout(()=>setState({autoSaved:false}),2000);
  },800);
  setState({autoSaveTimer:t});
}

function setCell(h,q,catId,text){
  const g=state.grid.map(r=>r.map(c=>({...c})));
  g[h][q]={catId,text};
  setState({grid:g});
  autoSave();
}

function filledCount(){return state.grid.flat().filter(c=>c.catId!==null||c.text).length;}
function catCount(id){return state.grid.flat().filter(c=>c.catId===id).length;}

// stats helpers
function addDays(ds,n){const d=new Date(ds);d.setDate(d.getDate()+n);return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function dateRange(end,days){const a=[];for(let i=days-1;i>=0;i--)a.push(addDays(end,-i));return a;}
function startOfWeek(ds){const d=new Date(ds);d.setDate(d.getDate()-d.getDay());return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function hoursForDate(ds){
  const g=st.get('ts:'+ds);if(!g)return null;
  const flat=g.flat();const r={};
  CATS.forEach(c=>{r[c.id]=flat.filter(x=>x.catId===c.id).length*0.25;});
  return r;
}
function shortDate(ds){return dateStrToShamsiShort(ds);}

const PERIODS=[
  {key:'week',label:'هفته',days:7,agg:'day'},
  {key:'month',label:'ماه',days:30,agg:'day'},
  {key:'quarter',label:'سه‌ماهه',days:90,agg:'week'},
  {key:'half',label:'شش‌ماهه',days:180,agg:'week'},
  {key:'year',label:'یکساله',days:365,agg:'month'},
];

function getChartData(period){
  const per=PERIODS.find(p=>p.key===period);
  const dates=dateRange(today(),per.days);
  if(per.agg==='day'){
    return dates.map(ds=>({label:shortDate(ds),hours:hoursForDate(ds)||{}}));
  }
  if(per.agg==='week'){
    const weeks={};
    dates.forEach(ds=>{
      const ws=startOfWeek(ds);
      if(!weeks[ws])weeks[ws]={label:shortDate(ws),hours:{}};
      const h=hoursForDate(ds);
      if(h)CATS.forEach(c=>{weeks[ws].hours[c.id]=(weeks[ws].hours[c.id]||0)+(h[c.id]||0);});
    });
    return Object.values(weeks);
  }
  if(per.agg==='month'){
    const months={};
    dates.forEach(ds=>{
      const mk=ds.slice(0,7);
      if(!months[mk]){const d=new Date(ds);months[mk]={label:`${d.getMonth()+1}/${String(d.getFullYear()).slice(2)}`,hours:{}};}
      const h=hoursForDate(ds);
      if(h)CATS.forEach(c=>{months[mk].hours[c.id]=(months[mk].hours[c.id]||0)+(h[c.id]||0);});
    });
    return Object.values(months);
  }
  return[];
}

// ── SVG line chart ────────────────────────────────────────────────────────
function buildChart(data,cats){
  if(!data.length||!cats.length)return'<div class="no-data">📭 داده‌ای وجود ندارد<br/><small>شروع به ثبت کن تا نمودار نمایش داده شه</small></div>';
  const W=Math.max(data.length*52,300),H=200;
  const pL=38,pR=10,pT=12,pB=30;
  const cW=W-pL-pR,cH=H-pT-pB;
  let maxH=1;
  data.forEach(d=>cats.forEach(c=>{if((d.hours[c.id]||0)>maxH)maxH=d.hours[c.id]||0;}));
  maxH=Math.ceil(maxH)||1;
  const xStep=cW/Math.max(data.length-1,1);
  const yS=h=>cH-(h/maxH)*cH;
  const ticks=[];
  const step=Math.max(1,Math.ceil(maxH/5));
  for(let i=0;i<=maxH;i+=step)ticks.push(i);
  if(!ticks.includes(maxH))ticks.push(maxH);

  let svg=`<svg width="${W}" height="${H}" style="min-width:${W}px;display:block">`;
  // grid
  ticks.forEach(t=>{
    const y=pT+yS(t);
    svg+=`<line x1="${pL}" x2="${pL+cW}" y1="${y}" y2="${y}" stroke="#DDD0C0" stroke-width="1"/>`;
    svg+=`<text x="${pL-4}" y="${y+4}" text-anchor="end" font-size="9" fill="#9A7A5A" font-family="Tahoma">${fa(t)}</text>`;
  });
  // x labels
  data.forEach((d,i)=>{
    const x=pL+i*xStep;
    svg+=`<text x="${x}" y="${H-4}" text-anchor="middle" font-size="9" fill="#7A5A3A" font-family="Tahoma">${d.label}</text>`;
  });
  // lines
  cats.forEach(cat=>{
    const pts=data.map((d,i)=>({x:pL+i*xStep,y:pT+yS(d.hours[cat.id]||0)}));
    const path=pts.map((p,i)=>`${i?'L':'M'}${p.x},${p.y}`).join(' ');
    svg+=`<path d="${path}" fill="none" stroke="${cat.color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
    pts.forEach(p=>{svg+=`<circle cx="${p.x}" cy="${p.y}" r="3" fill="${cat.color}"/>`;});
  });
  svg+='</svg>';
  return`<div class="chart-scroll">${svg}</div>`;
}

// ── share ─────────────────────────────────────────────────────────────────
async function shareData(){
  const rows=CATS.map(cat=>{
    const cnt=catCount(cat.id);if(!cnt)return null;
    const m=cnt*15,hh=Math.floor(m/60),mm=m%60;
    return{label:cat.label,color:cat.color,timeStr:(hh?hh+'h ':'')+mm+'m',pct:Math.round(cnt/96*100)};
  }).filter(Boolean);

  const W=640,PAD=36,HEADER=108,ROW_H=46,BAR_H=10,FOOTER=48;
  const H=HEADER+(rows.length?rows.length*ROW_H+24:60)+FOOTER;
  const cv=document.createElement('canvas');
  cv.width=W;cv.height=H;
  const ctx=cv.getContext('2d');

  // پس‌زمینه
  ctx.fillStyle='#F5EFE6';ctx.fillRect(0,0,W,H);
  // هدر
  ctx.fillStyle='#3D2510';ctx.fillRect(0,0,W,HEADER-20);
  // عنوان
  ctx.fillStyle='#FAF0E0';ctx.font='bold 22px Tahoma';ctx.textAlign='center';
  ctx.fillText('گزارش ثبت زمان',W/2,44);
  // تاریخ
  ctx.font='15px Tahoma';ctx.fillStyle='#C4A882';
  ctx.fillText(dateStrToShamsi(state.dateStr),W/2,72);
  // خط
  ctx.strokeStyle='#D4B896';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(PAD,HEADER);ctx.lineTo(W-PAD,HEADER);ctx.stroke();

  if(!rows.length){
    ctx.fillStyle='#9A7A5A';ctx.font='16px Tahoma';ctx.textAlign='center';
    ctx.fillText('هنوز چیزی ثبت نشده',W/2,HEADER+40);
  } else {
    const BAR_W=W-PAD*2-140;
    rows.forEach((r,i)=>{
      const y=HEADER+18+i*ROW_H;
      // دات رنگ
      ctx.fillStyle=r.color;
      ctx.beginPath();if(ctx.roundRect)ctx.roundRect(PAD,y,14,14,3);else ctx.rect(PAD,y,14,14);ctx.fill();
      // اسم
      ctx.fillStyle='#2A1A08';ctx.font='bold 14px Tahoma';ctx.textAlign='right';
      ctx.fillText(r.label,W-PAD-16,y+13);
      // زمان
      ctx.fillStyle=r.color;ctx.font='bold 13px Tahoma';ctx.textAlign='left';
      ctx.fillText(r.timeStr,PAD+22,y+13);
      // بار
      const barY=y+20;
      ctx.fillStyle='#E8DFD0';
      ctx.beginPath();if(ctx.roundRect)ctx.roundRect(PAD+22,barY,BAR_W,BAR_H,5);else ctx.rect(PAD+22,barY,BAR_W,BAR_H);ctx.fill();
      const fw=Math.max(BAR_W*(r.pct/100),6);
      ctx.fillStyle=r.color;
      ctx.beginPath();if(ctx.roundRect)ctx.roundRect(PAD+22,barY,fw,BAR_H,5);else ctx.rect(PAD+22,barY,fw,BAR_H);ctx.fill();
      // درصد
      ctx.fillStyle='#9A7A5A';ctx.font='12px Tahoma';ctx.textAlign='left';
      ctx.fillText(r.pct+'%',PAD+22+BAR_W+8,barY+9);
    });
  }
  // فوتر
  ctx.fillStyle='#9A7A5A';ctx.font='11px Tahoma';ctx.textAlign='center';
  ctx.fillText('ثبت زمان — گروه درخشیدن و دریافت کردن بوشهر',W/2,H-14);

  cv.toBlob(async blob=>{
    if(!blob){showToast('خطا در ساخت تصویر');return;}
    const file=new File([blob],'timesheet.png',{type:'image/png'});
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
      try{await navigator.share({files:[file],title:'گزارش ثبت زمان'});return;}catch(e){if(e.name==='AbortError')return;}
    }
    // fallback: دانلود
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='timesheet.png';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('تصویر ذخیره شد');
  },'image/png');
}

// ── shareStats: تصویر صفحه آمار ──────────────────────────────────────────
async function shareStats(){
  const per=PERIODS.find(p=>p.key===state.period);
  const chartData=getChartData(state.period);
  const visCats=CATS.filter(c=>state.selCats.includes(c.id));
  const totals={};
  CATS.forEach(c=>{totals[c.id]=chartData.reduce((a,d)=>a+(d.hours[c.id]||0),0);});
  const sorted=CATS.filter(c=>(totals[c.id]||0)>0).sort((a,b)=>(totals[b.id]||0)-(totals[a.id]||0));

  const W=680,PAD=36;
  // ارتفاع: هدر + نمودار خطی + مقایسه + فوتر
  const CHART_H=200,HEADER=100,GAP=16,BAR_SECTION=sorted.length*(36)+50,FOOTER=40;
  const H=HEADER+CHART_H+GAP+BAR_SECTION+FOOTER;

  const cv=document.createElement('canvas');
  cv.width=W;cv.height=H;
  const ctx=cv.getContext('2d');

  // پس‌زمینه
  ctx.fillStyle='#F5EFE6';ctx.fillRect(0,0,W,H);
  // هدر
  ctx.fillStyle='#3D2510';ctx.fillRect(0,0,W,HEADER-20);
  ctx.fillStyle='#FAF0E0';ctx.font='bold 22px Tahoma';ctx.textAlign='center';
  ctx.fillText('آمار ثبت زمان — '+per.label+' گذشته',W/2,44);
  ctx.font='14px Tahoma';ctx.fillStyle='#C4A882';
  ctx.fillText('گروه درخشیدن و دریافت کردن بوشهر',W/2,70);
  ctx.strokeStyle='#D4B896';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(PAD,HEADER);ctx.lineTo(W-PAD,HEADER);ctx.stroke();

  // ── نمودار خطی ───────────────────────────────────────────────────────
  const cL=PAD+30,cR=W-PAD,cT=HEADER+10,cB=HEADER+CHART_H-10;
  const cW=cR-cL,cH=cB-cT;

  // محاسبه max
  let maxH=1;
  chartData.forEach(d=>visCats.forEach(cat=>{if((d.hours[cat.id]||0)>maxH)maxH=d.hours[cat.id]||0;}));
  maxH=Math.ceil(maxH)||1;

  const xStep=chartData.length>1?cW/(chartData.length-1):cW;
  const yS=h=>cB-(h/maxH)*cH;

  // grid خطوط افقی
  const step=Math.max(1,Math.ceil(maxH/5));
  for(let t=0;t<=maxH;t+=step){
    const y=yS(t);
    ctx.strokeStyle='#DDD0C0';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cL,y);ctx.lineTo(cR,y);ctx.stroke();
    ctx.fillStyle='#9A7A5A';ctx.font='10px Tahoma';ctx.textAlign='right';
    ctx.fillText(t+'h',cL-4,y+4);
  }

  // برچسب‌های محور X
  const skip=Math.max(1,Math.ceil(chartData.length/12));
  chartData.forEach((d,i)=>{
    if(i%skip!==0&&i!==chartData.length-1)return;
    const x=cL+i*xStep;
    ctx.fillStyle='#7A5A3A';ctx.font='9px Tahoma';ctx.textAlign='center';
    ctx.fillText(d.label,x,cB+14);
  });

  // خطوط نمودار
  visCats.forEach(cat=>{
    const pts=chartData.map((d,i)=>({x:cL+i*xStep,y:yS(d.hours[cat.id]||0)}));
    ctx.strokeStyle=cat.color;ctx.lineWidth=2;ctx.lineJoin='round';ctx.lineCap='round';
    ctx.beginPath();
    pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
    ctx.stroke();
    pts.forEach(p=>{ctx.fillStyle=cat.color;ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();});
  });

  // ── legend ───────────────────────────────────────────────────────────
  const legY=cB+28;
  let legX=PAD;
  visCats.forEach(cat=>{
    if(legX>W-100){return;}
    ctx.fillStyle=cat.color;
    if(ctx.roundRect)ctx.roundRect(legX,legY,10,10,2);else ctx.rect(legX,legY,10,10);
    ctx.fill();
    ctx.fillStyle='#3D2510';ctx.font='10px Tahoma';ctx.textAlign='left';
    ctx.fillText(cat.label,legX+14,legY+9);
    legX+=ctx.measureText(cat.label).width+30;
  });

  // ── مقایسه کل ────────────────────────────────────────────────────────
  const barSecTop=HEADER+CHART_H+GAP+20;
  ctx.fillStyle='#3D2510';ctx.font='bold 14px Tahoma';ctx.textAlign='right';
  ctx.fillText('مقایسه کل ساعات',W-PAD,barSecTop-6);

  const maxT=Math.max(...sorted.map(c=>totals[c.id]||0),0.01);
  const BAR_W=W-PAD*2-130;

  sorted.forEach((cat,i)=>{
    const h=totals[cat.id]||0;
    const hh=Math.floor(h),mm=Math.round((h-hh)*60);
    const timeStr=(hh?hh+'h ':'')+mm+'m';
    const pct=Math.round(h/maxT*100);
    const y=barSecTop+i*36;

    // دات
    ctx.fillStyle=cat.color;
    if(ctx.roundRect)ctx.roundRect(PAD,y,12,12,3);else ctx.rect(PAD,y,12,12);
    ctx.fill();
    // اسم
    ctx.fillStyle='#2A1A08';ctx.font='bold 13px Tahoma';ctx.textAlign='right';
    ctx.fillText(cat.label,W-PAD-16,y+11);
    // زمان
    ctx.fillStyle=cat.color;ctx.font='bold 12px Tahoma';ctx.textAlign='left';
    ctx.fillText(timeStr,PAD+18,y+11);
    // بار
    const barY=y+16;
    ctx.fillStyle='#E8DFD0';
    if(ctx.roundRect)ctx.roundRect(PAD+18,barY,BAR_W,8,4);else ctx.rect(PAD+18,barY,BAR_W,8);
    ctx.fill();
    const fw=Math.max(BAR_W*(pct/100),4);
    ctx.fillStyle=cat.color;
    if(ctx.roundRect)ctx.roundRect(PAD+18,barY,fw,8,4);else ctx.rect(PAD+18,barY,fw,8);
    ctx.fill();
    // درصد
    ctx.fillStyle='#9A7A5A';ctx.font='11px Tahoma';ctx.textAlign='left';
    ctx.fillText(pct+'%',PAD+18+BAR_W+8,barY+7);
  });

  // فوتر
  ctx.fillStyle='#9A7A5A';ctx.font='11px Tahoma';ctx.textAlign='center';
  ctx.fillText('ثبت زمان — گروه درخشیدن و دریافت کردن بوشهر',W/2,H-10);

  // share
  cv.toBlob(async blob=>{
    if(!blob){showToast('خطا در ساخت تصویر');return;}
    const file=new File([blob],'stats.png',{type:'image/png'});
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
      try{await navigator.share({files:[file],title:'آمار ثبت زمان'});return;}catch(e){if(e.name==='AbortError')return;}
    }
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='stats.png';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('تصویر ذخیره شد');
  },'image/png');
}

    <div class="ios-hint">
      <div class="conf-title" style="text-align:center">📲 نصب اپ روی گوشی</div>
      <div style="font-size:13px;color:#3D2510;line-height:2;margin-bottom:16px;text-align:right">
        <b>آیفون (Safari):</b><br/>
        ۱. دکمه Share (مربع با فلش) رو بزن<br/>
        ۲. «Add to Home Screen» رو انتخاب کن<br/>
        ۳. روی Add بزن<br/><br/>
        <b>اندروید (Chrome):</b><br/>
        ۱. منوی ⋮ بالا رو باز کن<br/>
        ۲. «Add to Home screen» رو بزن
      </div>
      <button class="conf-yes" id="ios-ok" style="width:100%">فهمیدم ✓</button>
    </div>
  </div>`:'';

  // ── toast ────────────────────────────────────────────────────────────
  const toastHTML=s.toast?`<div class="toast">${s.toast}</div>`:'';

  // ── offline ──────────────────────────────────────────────────────────
  const offlineHTML=s.offline?`<div class="offline-badge">📵 آفلاین</div>`:'';

  // ── assemble ─────────────────────────────────────────────────────────
  document.getElementById('app').innerHTML=`
    ${offlineHTML}
    ${s.tab==='sheet'?sheetHTML:statsHTML}
    <nav class="bnav">
      <button class="${s.tab==='sheet'?'on':''}" id="nav-sheet"><span>⏱</span>ثبت زمان</button>
      <button class="${s.tab==='stats'?'on':''}" id="nav-stats"><span>📊</span>آمار</button>
      <button id="nav-install"><span>📲</span>نصب</button>
    </nav>
    ${modalHTML}${confirmHTML}${iosHTML}${toastHTML}
  `;

  // ── bind events ───────────────────────────────────────────────────────
  // nav
  document.getElementById('nav-sheet')?.addEventListener('click',()=>setState({tab:'sheet'}));
  document.getElementById('nav-stats')?.addEventListener('click',()=>setState({tab:'stats'}));
  document.getElementById('nav-install')?.addEventListener('click',()=>{
    if(state.installPrompt){
      state.installPrompt.prompt();
      state.installPrompt.userChoice.then(r=>{if(r.outcome==='accepted')setState({installPrompt:null});});
    } else {
      // همیشه راهنما نشون بده
      setState({showInstall:true});
    }
  });

  // sheet
  if(s.tab==='sheet'){
    document.getElementById('btn-prev')?.addEventListener('click',()=>loadDate(prevDay(state.dateStr)));
    document.getElementById('btn-next')?.addEventListener('click',()=>{const nx=nextDay(state.dateStr);if(nx<=today())loadDate(nx);});
    document.getElementById('btn-today')?.addEventListener('click',()=>loadDate(today()));
    document.getElementById('btn-today2')?.addEventListener('click',()=>loadDate(today()));
    document.getElementById('btn-share')?.addEventListener('click',shareData);
    document.getElementById('btn-reset')?.addEventListener('click',()=>setState({confirm:true}));
    document.querySelectorAll('.cell').forEach(el=>{
      el.addEventListener('click',()=>{
        const h=+el.dataset.h,q=+el.dataset.q;
        const cell=s.grid[h][q];
        setState({modal:{h,q},modalCat:cell.catId,modalText:cell.text||''});
      });
    });
  }

  // stats
  if(s.tab==='stats'){
    document.querySelectorAll('.period-btn').forEach(el=>{
      el.addEventListener('click',()=>setState({period:el.dataset.period}));
    });
    document.querySelectorAll('.cf-btn').forEach(el=>{
      el.addEventListener('click',()=>{
        const id=+el.dataset.cat;
        const sc=s.selCats.includes(id)?(s.selCats.length>1?s.selCats.filter(x=>x!==id):s.selCats):[...s.selCats,id];
        setState({selCats:sc});
      });
    });
    document.getElementById('btn-share-stats')?.addEventListener('click',shareStats);
  }

  // modal
  document.getElementById('ov')?.addEventListener('click',e=>{if(e.target.id==='ov')setState({modal:null});});
  document.querySelectorAll('[data-mc]').forEach(el=>{
    el.addEventListener('click',()=>{const id=+el.dataset.mc;setState({modalCat:s.modalCat===id?null:id});});
  });
  const mtxt=document.getElementById('mtxt');
  if(mtxt){mtxt.addEventListener('input',e=>{ state.modalText=e.target.value; });}
  document.getElementById('m-ok')?.addEventListener('click',()=>{
    if(!s.modal)return;
    setCell(s.modal.h,s.modal.q,s.modalCat,state.modalText||'');
    setState({modal:null,modalCat:null,modalText:''});
  });
  document.getElementById('m-clr')?.addEventListener('click',()=>{
    if(!s.modal)return;
    setCell(s.modal.h,s.modal.q,null,'');
    setState({modal:null,modalCat:null,modalText:''});
  });
  document.getElementById('m-can')?.addEventListener('click',()=>setState({modal:null}));

  // confirm
  document.getElementById('conf-ov')?.addEventListener('click',e=>{if(e.target.id==='conf-ov')setState({confirm:false});});
  document.getElementById('conf-yes')?.addEventListener('click',()=>{setState({grid:emptyGrid(),confirm:false});st.set('ts:'+s.dateStr,emptyGrid());showToast('پاک شد');});
  document.getElementById('conf-no')?.addEventListener('click',()=>setState({confirm:false}));

  // ios
  document.getElementById('ios-ov')?.addEventListener('click',e=>{if(e.target.id==='ios-ov')setState({showInstall:false});});
  document.getElementById('ios-ok')?.addEventListener('click',()=>setState({showInstall:false}));
}

// ── init ──────────────────────────────────────────────────────────────────
window.addEventListener('offline',()=>setState({offline:true}));
window.addEventListener('online',()=>setState({offline:false}));
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();setState({installPrompt:e});});
loadDate(today());
</script>
</body>
</html>
